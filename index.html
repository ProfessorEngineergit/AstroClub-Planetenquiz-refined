<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1426">
    <meta name="color-scheme" content="dark">
    <title>Planeten-Quiz</title>
	<script src="Planetenquiz.js" defer></script>
	<script src="firebase-score-client.js" type="module"></script>
	<link rel="stylesheet" href="Planetenquiz.css">
</head>
<body>
<div class="container">
    <div class="text-box header-box">
        <div class="lang-switch">
            <label for="langSelect">Sprache / Language:</label>
            <select id="langSelect" aria-label="Language selector">
                <option value="de">Deutsch</option>
                <option value="en">English</option>
            </select>
        </div>
        <img src="AstroClub_logo.jpg" alt="AstroClub Logo" class="logo">
        <h1 id="titleText">Planeten-Quiz</h1>
    </div>
    <form id="quizForm" onsubmit="event.preventDefault(); checkAnswers(); return false;">
        <div id="quizContent"></div>
        <div id="dragDropContent"></div>
        <div id="namePrompt" class="text-box name-prompt">
            <label for="playerName" id="namePromptLabel">Name für das Leaderboard</label>
            <input type="text" id="playerName" name="playerName" maxlength="30" placeholder="Dein Name" autocomplete="off" required>
        </div>
    <input type="button" id="evaluateBtn" class="action-button" value="Quiz auswerten" onclick="checkAnswers()">
    </form>
    <div id="result"></div>
    <div id="antwort"></div>
</div>
